<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisador de Lubrificante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .navy-blue { background-color: #002B5C; }
        .red-accent { background-color: #E30613; }
        .btn-active { border: 3px solid #E30613 !important; background-color: #002B5C !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-2xl relative">
        
        <header class="navy-blue p-5 text-center border-b-4 border-red-600">
            <h1 class="text-white text-xl font-black uppercase italic tracking-tighter">
                Pesquisador de <span class="text-red-600">Lubrificante</span>
            </h1>
        </header>

        <main class="flex-1 flex flex-col p-6 space-y-4">
            
            <!-- TELA 1: HOME -->
            <div id="screen-home" class="flex-1 flex flex-col justify-center space-y-6">
                <input type="file" accept="image/*" capture="camera" id="cameraInput" class="hidden" onchange="handlePhoto(this)">
                <button onclick="document.getElementById('cameraInput').click()" class="w-full navy-blue p-8 rounded-2xl flex items-center justify-center gap-4 text-white shadow-lg active:scale-95 transition-all">
                    <span class="text-4xl">📸</span>
                    <p class="font-bold uppercase text-lg">Tirar Foto do Produto</p>
                </button>
                <button onclick="showForm()" class="w-full red-accent p-6 rounded-2xl flex items-center justify-center gap-4 text-white shadow-lg active:scale-95 transition-all">
                    <span class="text-3xl">⌨️</span>
                    <p class="font-bold uppercase">Inserção Manual</p>
                </button>
            </div>

            <!-- TELA 2: FORMULÁRIO -->
            <div id="screen-form" class="hidden space-y-4 pb-10">
                <button onclick="location.reload()" class="text-blue-900 font-bold text-xs uppercase">← Voltar</button>
                
                <div class="space-y-3">
                    <label class="block text-[10px] font-bold uppercase text-gray-500 italic">Colaborador</label>
                    <input id="colaborador" type="text" placeholder="Seu nome" class="w-full p-3 border rounded-lg outline-none focus:border-red-600 shadow-sm">

                    <label class="block text-[10px] font-bold uppercase text-gray-500 italic">Marca</label>
                    <input id="marca" type="text" placeholder="Ex: Mobil, Ipiranga..." class="w-full p-3 border rounded-lg outline-none shadow-sm">

                    <label class="block text-[10px] font-bold uppercase text-gray-500 italic">Nome do Produto</label>
                    <input id="produto" type="text" placeholder="Ex: Rimula R4" class="w-full p-3 border rounded-lg outline-none shadow-sm">

                    <label class="block text-[10px] font-bold uppercase text-gray-500 italic">Viscosidade</label>
                    <select id="viscosidade" onchange="checkOther(this)" class="w-full p-3 border rounded-lg bg-white shadow-sm outline-none">
                        <option value="">Selecione...</option>
                        <option>0W-16</option><option>0W-20</option><option>0W-30</option><option>0W-40</option>
                        <option>5W-20</option><option>5W-30</option><option>5W-40</option>
                        <option>10W-30</option><option>10W-40</option><option>15W-40</option><option>20W-50</option>
                        <option>SAE 30</option><option>SAE 40</option><option>SAE 90</option><option>SAE 140</option>
                        <option value="Outro">Outro (Digitar)</option>
                    </select>
                    <input id="visco_outro" type="text" placeholder="Digite a viscosidade" class="hidden w-full p-3 border rounded-lg border-red-600 outline-none mt-2">

                    <label class="block text-[10px] font-bold uppercase text-gray-500 italic">Fluxo de Venda (De -> Para)</label>
                    <select id="tipo_cliente" class="w-full p-3 border rounded-lg bg-white shadow-sm outline-none">
                        <option value="">Selecione o fluxo...</option>
                        <option>Fábrica -> Distribuidor</option>
                        <option>Fábrica -> Consumo</option>
                        <option>Distribuidor -> Revenda</option>
                        <option>Revenda -> Consumidor Final</option>
                    </select>

                    <label class="block text-[10px] font-bold uppercase text-gray-500 italic">Unidade</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btnL" onclick="setUnit('Litro')" class="py-3 border-2 rounded-lg font-bold btn-active">LITRO</button>
                        <button id="btnK" onclick="setUnit('Kilo')" class="py-3 border-2 rounded-lg font-bold border-gray-200 text-gray-400">KILO</button>
                    </div>

                    <div class="p-4 bg-gray-50 rounded-2xl border-2 border-blue-900 mt-4">
                        <label class="block text-center text-[10px] font-bold uppercase text-blue-900 mb-1">Preço Unitário (R$)</label>
                        <input id="preco" type="number" step="0.01" placeholder="0,00" class="w-full bg-transparent text-center text-4xl font-black text-blue-900 outline-none">
                    </div>

                    <div id="gps-status" class="text-[10px] text-center text-gray-400 italic">📍 Localização Pendente</div>
                </div>

                <button id="btnSalvar" onclick="sendToGoogle()" class="w-full navy-blue text-white py-5 rounded-xl font-bold uppercase shadow-lg text-lg active:scale-95 transition-all">Gravar na Planilha</button>
            </div>

            <!-- TELA SUCESSO -->
            <div id="screen-success" class="hidden flex-1 flex flex-col items-center justify-center text-center">
                <div class="text-6xl mb-4">✅</div>
                <h2 class="text-2xl font-black text-blue-900 uppercase">Dados Enviados!</h2>
                <p class="text-gray-500 mt-2">A foto foi salva no Drive e a planilha atualizada.</p>
                <button onclick="location.reload()" class="mt-8 px-10 py-4 navy-blue text-white rounded-xl font-bold">Nova Pesquisa</button>
            </div>
        </main>
    </div>

    <script>
        let selectedUnit = 'Litro';
        let fotoBase64 = "";
        let latLong = "";
        
        // --- ATENÇÃO: COLE SUA URL ABAIXO ---
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxHXR2D72cX3Gy1oewePuDAAhGDOlkJZ4vxSB2bJnT2vTjqKsH8UEnvwOtTdfFLFbtgjA/exec";

        // Capturar GPS
        navigator.geolocation.getCurrentPosition((pos) => {
            latLong = `${pos.coords.latitude}, ${pos.coords.longitude}`;
            document.getElementById('gps-status').innerText = "📍 Localização Capturada";
            document.getElementById('gps-status').className = "text-[10px] text-center text-green-600 font-bold italic";
        });

        function handlePhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    fotoBase64 = e.target.result;
                    showForm();
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function checkOther(select) {
            const inputOutro = document.getElementById('visco_outro');
            inputOutro.classList.toggle('hidden', select.value !== 'Outro');
        }

        function setUnit(u) {
            selectedUnit = u;
            document.getElementById('btnL').className = u === 'Litro' ? 'py-3 border-2 rounded-lg font-bold btn-active' : 'py-3 border-2 rounded-lg font-bold border-gray-200 text-gray-400';
            document.getElementById('btnK').className = u === 'Kilo' ? 'py-3 border-2 rounded-lg font-bold btn-active' : 'py-3 border-2 rounded-lg font-bold border-gray-200 text-gray-400';
        }

        function showForm() {
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-form').classList.remove('hidden');
        }

        async function sendToGoogle() {
            const btn = document.getElementById('btnSalvar');
            btn.innerText = "ENVIANDO..."; btn.disabled = true;

            let viscoFinal = document.getElementById('viscosidade').value;
            if(viscoFinal === "Outro") viscoFinal = document.getElementById('visco_outro').value;

            const dados = {
                colaborador: document.getElementById('colaborador').value,
                marca: document.getElementById('marca').value,
                produto: document.getElementById('produto').value,
                viscosidade: viscoFinal,
                cliente: document.getElementById('tipo_cliente').value,
                unidade: selectedUnit,
                preco: document.getElementById('preco').value,
                localizacao: latLong,
                foto: fotoBase64
            };

            try {
                // Usando fetch com no-cors para evitar problemas de política de segurança simples
                await fetch(GOOGLE_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(dados) 
                });
                // Como no-cors não permite ler a resposta, assumimos sucesso se não der erro
                document.getElementById('screen-form').classList.add('hidden');
                document.getElementById('screen-success').classList.remove('hidden');
            } catch (e) {
                alert("Erro ao enviar! Tente novamente.");
                btn.innerText = "GRAVAR NA PLANILHA"; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
