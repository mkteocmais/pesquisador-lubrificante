<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisador de Lubrificante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .navy-blue { background-color: #002B5C; }
        .red-accent { background-color: #E30613; }
        .text-navy { color: #002B5C; }
        .btn-active { border: 3px solid #E30613 !important; background-color: #002B5C !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-2xl relative">
        
        <!-- HEADER -->
        <header class="navy-blue p-5 text-center border-b-4 border-red-600">
            <h1 class="text-white text-xl font-black uppercase italic tracking-tighter">
                PESQUISADOR DE <span class="text-red-600">LUBRIFICANTE</span>
            </h1>
        </header>

        <main class="flex-1 flex flex-col p-6 space-y-4">
            
            <!-- TELA 1: HOME -->
            <div id="screen-home" class="flex-1 flex flex-col justify-center space-y-6">
                <input type="file" accept="image/*" capture="camera" id="cameraInput" class="hidden" onchange="handlePhoto(this)">
                <input type="file" accept="image/*" id="galleryInput" class="hidden" onchange="handlePhoto(this)">
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="document.getElementById('cameraInput').click()" class="navy-blue p-6 rounded-2xl flex flex-col items-center justify-center gap-2 text-white shadow-lg active:scale-95 transition-all">
                        <span class="text-4xl">📸</span>
                        <p class="font-bold uppercase text-xs italic">Câmera</p>
                    </button>
                    <button onclick="document.getElementById('galleryInput').click()" class="navy-blue p-6 rounded-2xl flex flex-col items-center justify-center gap-2 text-white shadow-lg active:scale-95 transition-all">
                        <span class="text-4xl">🖼️</span>
                        <p class="font-bold uppercase text-xs italic">Galeria</p>
                    </button>
                </div>

                <button onclick="showForm()" class="w-full red-accent p-6 rounded-2xl flex items-center justify-center gap-4 text-white shadow-lg active:scale-95 transition-all">
                    <span class="text-3xl">⌨️</span>
                    <p class="font-bold uppercase italic tracking-wider">Inserção Manual</p>
                </button>
            </div>

            <!-- TELA 2: FORMULÁRIO -->
            <div id="screen-form" class="hidden space-y-4 pb-10">
                <button onclick="location.reload()" class="text-blue-900 font-bold text-[10px] uppercase italic">← Voltar ao Início</button>
                
                <div class="space-y-3">
                    <label class="block text-[10px] font-bold uppercase text-gray-400 italic">Colaborador</label>
                    <input id="colaborador" type="text" placeholder="Seu nome" class="w-full p-3 border rounded-lg shadow-sm outline-none focus:border-red-600 text-sm">

                    <label class="block text-[10px] font-bold uppercase text-gray-400 italic">Empresa Pesquisada</label>
                    <input id="empresa" type="text" placeholder="Nome do local/empresa" class="w-full p-3 border rounded-lg shadow-sm outline-none focus:border-red-600 text-sm">

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold uppercase text-gray-400 italic">Estado</label>
                            <input id="estado" type="text" placeholder="Ex: SP" class="w-full p-3 border rounded-lg shadow-sm outline-none focus:border-red-600 text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase text-gray-400 italic">Cidade</label>
                            <input id="cidade" type="text" placeholder="Cidade" class="w-full p-3 border rounded-lg shadow-sm outline-none focus:border-red-600 text-sm">
                        </div>
                    </div>

                    <label class="block text-[10px] font-bold uppercase text-gray-400 italic">Marca do Produto</label>
                    <input id="marca" type="text" placeholder="Ex: Mobil, Shell, Ipiranga..." class="w-full p-3 border rounded-lg shadow-sm outline-none focus:border-red-600 text-sm">

                    <label class="block text-[10px] font-bold uppercase text-gray-400 italic">Nome do Produto</label>
                    <input id="produto" type="text" placeholder="Ex: Rimula R4, Delvac..." class="w-full p-3 border rounded-lg shadow-sm outline-none focus:border-red-600 text-sm">

                    <label class="block text-[10px] font-bold uppercase text-gray-400 italic">Viscosidade</label>
                    <select id="viscosidade" onchange="checkOther(this, 'visco_outro')" class="w-full p-3 border rounded-lg bg-white shadow-sm outline-none text-sm">
                        <option value="">Selecione...</option>
                        <option>0W-16</option><option>0W-20</option><option>0W-30</option><option>0W-40</option>
                        <option>5W-20</option><option>5W-30</option><option>5W-40</option>
                        <option>10W-30</option><option>10W-40</option><option>15W-40</option><option>20W-50</option>
                        <option>SAE 30</option><option>SAE 40</option><option>SAE 90</option><option>SAE 140</option>
                        <option value="Outro">Outro (Digitar)</option>
                    </select>
                    <input id="visco_outro" type="text" placeholder="Digite a viscosidade" class="hidden w-full p-3 border rounded-lg border-red-600 outline-none mt-2 text-sm">

                    <label class="block text-[10px] font-bold uppercase text-gray-400 italic">Fluxo de Venda (De -> Para)</label>
                    <select id="tipo_cliente" class="w-full p-3 border rounded-lg bg-white shadow-sm outline-none text-sm">
                        <option value="">Selecione...</option>
                        <option>Fábrica -> Distribuidor</option>
                        <option>Fábrica -> Consumo</option>
                        <option>Distribuidor -> Revenda</option>
                        <option>Revenda -> Consumidor Final</option>
                    </select>

                    <label class="block text-[10px] font-bold uppercase text-gray-400 italic">SKU Pesquisado</label>
                    <select id="sku" onchange="checkOther(this, 'sku_outro')" class="w-full p-3 border rounded-lg bg-white shadow-sm outline-none text-sm">
                        <option value="">Selecione o SKU...</option>
                        <option>Bisnaga 80g</option>
                        <option>Frasco 100ml</option>
                        <option>Frasco 200ml</option>
                        <option>Pote 500g</option>
                        <option>Frasco 900ml</option>
                        <option>Pote 1Kg</option>
                        <option>Frasco 1L</option>
                        <option>Granel</option>
                        <option>Bisnaga 1,5kg</option>
                        <option>Bombona 4L</option>
                        <option>Bombona 5L</option>
                        <option>Caixa Frascos 60x100ml</option>
                        <option>Caixa Sachês 100x80g</option>
                        <option>Caixa Frascos 48x200ml</option>
                        <option>Balde 10Kg</option>
                        <option>Caixa Frascos 12x900ml</option>
                        <option>Caixa Potes 12x1Kg</option>
                        <option>Caixa Frascos 12x1L</option>
                        <option>Caixa Potes 36x500g</option>
                        <option>Bombona 19L</option>
                        <option>Balde 20Kg</option>
                        <option>Bombona 20L</option>
                        <option>Caixa Bombonas 4x4L</option>
                        <option>Caixa Bombonas 4x5L</option>
                        <option>Caixa Sachês 16x1,5Kg</option>
                        <option>Caixa Potes 24x1Kg</option>
                        <option>Caixa Frascos 24x1L</option>
                        <option>Tamborete 60L</option>
                        <option>Tambor 170Kg</option>
                        <option>Tambor 200L</option>
                        <option>Tambor 209L</option>
                        <option>Container 1000L</option>
                        <option value="Outro">Outros (Digitar)</option>
                    </select>
                    <input id="sku_outro" type="text" placeholder="Descreva o SKU" class="hidden w-full p-3 border rounded-lg border-red-600 outline-none mt-2 text-sm">

                    <div class="p-4 bg-gray-50 rounded-2xl border-2 border-blue-900 mt-4 shadow-inner text-center">
                        <label class="block text-[10px] font-bold uppercase text-blue-900 mb-1 italic">Preço Pesquisado (R$)</label>
                        <div class="flex items-center justify-center">
                            <span class="text-2xl font-black text-blue-900 mr-1 italic">R$</span>
                            <input id="preco" type="number" step="0.01" placeholder="0,00" class="w-full bg-transparent text-center text-4xl font-black text-blue-900 outline-none">
                        </div>
                    </div>
                </div>

                <div id="gps-info" class="text-[9px] text-center text-gray-400 italic">Buscando localização...</div>

                <button id="btnSalvar" onclick="uploadAndSave()" class="w-full navy-blue text-white py-5 rounded-xl font-bold uppercase shadow-lg text-lg active:scale-95 transition-all">Gravar no Sistema</button>
                
                <p class="text-center text-[10px] font-bold uppercase text-gray-400 tracking-widest mt-4 italic">
                    Marketing - Inteligência de Mercado
                </p>
            </div>

            <!-- TELA SUCESSO -->
            <div id="screen-success" class="hidden flex-1 flex flex-col items-center justify-center text-center">
                <div class="text-6xl mb-4">✅</div>
                <h2 class="text-2xl font-black text-blue-900 uppercase italic">Dados Enviados!</h2>
                <button onclick="location.reload()" class="mt-8 px-10 py-4 navy-blue text-white rounded-xl font-bold uppercase italic shadow-lg">Nova Coleta</button>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://udbaskofvhcaudyeolrd.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Yp-LdHAENWBZByTStXKjnw_iN41jrm3";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let fotoFile = null;
        let latLong = "";

        // Geolocalização
        navigator.geolocation.getCurrentPosition(async (pos) => {
            latLong = `${pos.coords.latitude}, ${pos.coords.longitude}`;
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                const data = await response.json();
                if(data.address) {
                    document.getElementById('cidade').value = data.address.city || data.address.town || data.address.village || "";
                    document.getElementById('estado').value = data.address.state || "";
                    document.getElementById('gps-info').innerText = "📍 Localização Detectada";
                }
            } catch (e) { 
                document.getElementById('gps-info').innerText = "📍 GPS Ativo";
            }
        });

        function handlePhoto(input) {
            if (input.files && input.files[0]) {
                fotoFile = input.files[0];
                showForm();
            }
        }

        // Função genérica para tratar o "Outro"
        function checkOther(select, targetId) {
            const inputOutro = document.getElementById(targetId);
            inputOutro.classList.toggle('hidden', select.value !== 'Outro');
        }

        function showForm() {
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-form').classList.remove('hidden');
        }

        async function uploadAndSave() {
            const btn = document.getElementById('btnSalvar');
            btn.innerText = "PROCESSANDO..."; 
            btn.disabled = true;

            let finalUrl = "";
            try {
                if (fotoFile) {
                    const fileName = `${Date.now()}_${fotoFile.name}`;
                    const { data: uploadData, error: uploadError } = await _supabase.storage.from('fotos-lubrificantes').upload(fileName, fotoFile);
                    if (uploadError) throw uploadError;
                    const { data: urlData } = _supabase.storage.from('fotos-lubrificantes').getPublicUrl(fileName);
                    finalUrl = urlData.publicUrl;
                }

                let viscoFinal = document.getElementById('viscosidade').value;
                if(viscoFinal === "Outro") viscoFinal = document.getElementById('visco_outro').value;

                let skuFinal = document.getElementById('sku').value;
                if(skuFinal === "Outro") skuFinal = document.getElementById('sku_outro').value;

                const { error: dbError } = await _supabase.from('lubricants').insert([{
                    colaborador: document.getElementById('colaborador').value,
                    empresa: document.getElementById('empresa').value,
                    estado: document.getElementById('estado').value,
                    cidade: document.getElementById('cidade').value,
                    marca: document.getElementById('marca').value,
                    produto: document.getElementById('produto').value,
                    viscosidade: viscoFinal,
                    cliente: document.getElementById('tipo_cliente').value,
                    sku: skuFinal,
                    preco: parseFloat(document.getElementById('preco').value) || 0,
                    localizacao: latLong,
                    foto_url: finalUrl
                }]);

                if (dbError) throw dbError;
                document.getElementById('screen-form').classList.add('hidden');
                document.getElementById('screen-success').classList.remove('hidden');

            } catch (err) {
                alert("Erro: " + err.message);
                btn.innerText = "GRAVAR NO SISTEMA";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
